<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FIRE OS 2.3.2</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, addDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB5jUo6VmTNTRtCfwWhkwwXLYv1dcTSSi4",
      authDomain: "fire-dashboard-86bb9.firebaseapp.com",
      projectId: "fire-dashboard-86bb9",
      storageBucket: "fire-dashboard-86bb9.firebasestorage.app",
      messagingSenderId: "153073679515",
      appId: "1:153073679515:web:f49de492d1e79109fd1a3e",
      measurementId: "G-T34VDEFP7J"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const I18N = {
      zh: { home:"首頁", assets:"資產", invest:"投資", debt:"負債", settings:"設定", goodEvening:"GOOD EVENING", welcome:"歡迎回來", myAssets:"我的資產", netWorth:"淨資產", totalAssets:"總資產", totalDebt:"總負債", cashflow:"月現金流", fire:"FIRE 進度", ai:"AI 今日洞察", allocation:"資產配置", list:"資產列表", language:"語言", logout:"登出", add:"新增資產", edit:"編輯資產", save:"儲存", cancel:"取消", del:"刪除", name:"名稱", type:"類型", amount:"金額", note:"備註", cloud:"Cloud synced", loginSub:"用 Google 登入，讓你的財富資料雲端同步。", login:"使用 Google 登入", empty:"還沒有資產，按 + 新增第一筆。", cash:"現金", stock:"股票", etf:"ETF", realEstate:"不動產", crypto:"加密貨幣", other:"其他" },
      en: { home:"Home", assets:"Assets", invest:"Invest", debt:"Debt", settings:"Settings", goodEvening:"GOOD EVENING", welcome:"Welcome back", myAssets:"My Assets", netWorth:"Net Worth", totalAssets:"Total Assets", totalDebt:"Total Debt", cashflow:"Monthly Cashflow", fire:"FIRE Progress", ai:"AI Insight", allocation:"Asset Allocation", list:"Asset List", language:"Language", logout:"Logout", add:"Add Asset", edit:"Edit Asset", save:"Save", cancel:"Cancel", del:"Delete", name:"Name", type:"Type", amount:"Amount", note:"Note", cloud:"Cloud synced", loginSub:"Sign in with Google and sync your wealth data to the cloud.", login:"Continue with Google", empty:"No assets yet. Tap + to add your first one.", cash:"Cash", stock:"Stocks", etf:"ETF", realEstate:"Real Estate", crypto:"Crypto", other:"Other" }
    };

    const state = { user:null, lang:localStorage.getItem('fireos_lang') || 'zh', tab:'home', assets:[], debts:[], settings:{fireGoal:30000000}, cashflow:{income:150000, expense:90000}, charts:{}, unsub:[], editing:null };
    const $ = id => document.getElementById(id);
    const t = key => I18N[state.lang][key] || key;
    const money = n => 'NT$' + Math.round(Number(n)||0).toLocaleString('zh-TW');
    const parseMoney = v => Number(String(v||'').replace(/,/g,'').replace(/[^0-9.-]/g,'')) || 0;
    const uidPath = (...p) => ['users', state.user.uid, ...p];
    const userDoc = name => doc(db, ...uidPath(name));
    const typeName = type => t(type) || type;
    const icon = type => ({cash:'💵', stock:'📈', etf:'💎', realEstate:'🏠', crypto:'₿', other:'◼'}[type] || '◼');

    async function seed(user){
      const ref = userDoc('profile');
      if((await getDoc(ref)).exists()) return;
      await setDoc(ref,{name:user.displayName,email:user.email,photo:user.photoURL,createdAt:serverTimestamp()});
      await setDoc(userDoc('settings'),{fireGoal:30000000,language:state.lang,currency:'TWD'});
      await setDoc(userDoc('cashflow'),{income:150000,expense:90000});
      const samples=[['VOO','etf',2300000,'Vanguard S&P 500 ETF'],['0050','etf',1500000,'元大台灣50'],['現金 / Cash','cash',320000,'Emergency fund'],['不動產 / Real Estate','realEstate',3000000,'Property'],['台股 / Taiwan Stocks','stock',2880000,'Local equities']];
      for(const [name,type,amount,note] of samples) await addDoc(collection(db,...uidPath('assets')),{name,type,amount,note,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
      await addDoc(collection(db,...uidPath('debts')),{name:'房貸 / Mortgage',amount:2300000,note:'Home loan',createdAt:serverTimestamp()});
    }

    function listen(){
      state.unsub.forEach(f=>f()); state.unsub=[];
      state.unsub.push(onSnapshot(collection(db,...uidPath('assets')), s=>{ state.assets=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.amount||0)-(a.amount||0)); render(); }));
      state.unsub.push(onSnapshot(collection(db,...uidPath('debts')), s=>{ state.debts=s.docs.map(d=>({id:d.id,...d.data()})); render(); }));
      state.unsub.push(onSnapshot(userDoc('settings'), s=>{ if(s.exists()){ state.settings={...state.settings,...s.data()}; if(state.settings.language && state.settings.language!==state.lang){ state.lang=state.settings.language; localStorage.setItem('fireos_lang',state.lang); }} render(); }));
      state.unsub.push(onSnapshot(userDoc('cashflow'), s=>{ if(s.exists()) state.cashflow=s.data(); render(); }));
    }

    function totals(){ const assets=state.assets.reduce((s,a)=>s+(Number(a.amount)||0),0); const debt=state.debts.reduce((s,d)=>s+(Number(d.amount)||0),0); const net=assets-debt; const income=Number(state.cashflow.income)||0; const expense=Number(state.cashflow.expense)||0; const cashflow=income-expense; const goal=Number(state.settings.fireGoal)||30000000; return {assets,debt,net,income,expense,cashflow,goal,fire:Math.min(100,Math.max(0,net/goal*100)), debtRatio:assets?debt/assets*100:0, savings:income?cashflow/income*100:0}; }
    function groups(){ const m={}; state.assets.forEach(a=>m[a.type]=(m[a.type]||0)+(Number(a.amount)||0)); return Object.entries(m).sort((a,b)=>b[1]-a[1]); }

    function render(){ if(!state.user) return; translate(); const tt=totals(); const name=(state.user.displayName||'Andy').split(' ')[0];
      $('welcomeName').textContent = `${t('welcome')}，${name} 👋`; $('avatar').src=state.user.photoURL||''; $('email').textContent=state.user.email||'';
      $('netWorth').textContent=money(tt.net); $('homeAssets').textContent=money(tt.assets); $('homeDebt').textContent=money(tt.debt); $('homeCashflow').textContent=money(tt.cashflow); $('homeSub').textContent=`${t('cloud')} · 儲蓄率 ${tt.savings.toFixed(1)}% · 負債比 ${tt.debtRatio.toFixed(1)}%`;
      $('fireRing').style.setProperty('--pct', (tt.fire*3.6)+'deg'); $('firePct').textContent=tt.fire.toFixed(0)+'%'; $('fireSmall').textContent=tt.fire.toFixed(0)+'%';
      $('assetHeroAmount').textContent=money(tt.assets); $('assetHeroChange').textContent='▲ Today +' + money(Math.round(tt.assets*.0018)) + ' (+0.18%)'; $('debtHeroAmount').textContent=money(tt.debt);
      const top=groups()[0]||['other',0]; const pct=tt.assets?(top[1]/tt.assets*100).toFixed(1):'0.0';
      $('aiList').innerHTML=[`目前資產配置以 ${typeName(top[0])} 為主，占比約 ${pct}%。`,`你的淨資產為 ${money(tt.net)}，距離 FIRE 目標還差 ${money(Math.max(0,tt.goal-tt.net))}。`,`若每月多投入 NT$10,000，預估可提早約 10 個月達成 FIRE。`].map(x=>`<div class="insight">${x}</div>`).join('');
      $('assetList').innerHTML = state.assets.length ? state.assets.map(a=>`<button class="wealth-row" onclick="window.detail('${a.id}')"><div class="asset-icon ${a.type}">${icon(a.type)}</div><div class="row-main"><strong>${esc(a.name)}</strong><span>${typeName(a.type)} · ${esc(a.note||'')}</span></div><div class="row-right"><b>${money(a.amount)}</b><span>▲ ${tt.assets?(a.amount/tt.assets*100).toFixed(0):0}%</span></div></button>`).join('') : `<div class="empty">${t('empty')}</div>`;
      $('debtList').innerHTML = state.debts.map(d=>`<div class="debt-card"><div><h3>${esc(d.name)}</h3><p>${esc(d.note||'')}</p></div><strong>-${money(d.amount)}</strong></div>`).join('');
      $('allocationBars').innerHTML = groups().map(([type,amount])=>{ const p=tt.assets?amount/tt.assets*100:0; return `<div class="alloc"><span>${typeName(type)}</span><b>${p.toFixed(1)}%</b><div><i style="width:${p}%"></i></div></div>`; }).join('');
      charts(tt);
    }

    function translate(){ document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n)); $('langBtn').textContent=state.lang==='zh'?'中 / EN':'EN / 中'; }
    function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function chartOpts(){ return {responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'rgba(255,255,255,.55)'}},y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'rgba(255,255,255,.55)',callback:v=>Math.round(v/1000000)+'M'}}}}; }
    function charts(tt){
      if(state.charts.line) state.charts.line.destroy(); if(state.charts.donut) state.charts.donut.destroy();
      state.charts.line = new Chart($('trendChart'),{type:'line',data:{labels:['6/8','6/15','6/22','6/29','7/6'],datasets:[{data:[tt.assets*.86,tt.assets*.9,tt.assets*.94,tt.assets*.98,tt.assets],borderColor:'#64F1A6',backgroundColor:'rgba(100,241,166,.12)',fill:true,tension:.38,pointRadius:2}]},options:chartOpts()});
      const g=groups(); state.charts.donut = new Chart($('donutChart'),{type:'doughnut',data:{labels:g.map(x=>typeName(x[0])),datasets:[{data:g.map(x=>x[1]),backgroundColor:['#64F1A6','#6DA8FF','#FFBE4D','#F17C82','#A886FF','#AAB3BD'],borderWidth:0}]},options:{responsive:true,cutout:'68%',plugins:{legend:{display:false}}}});
    }
    function tab(name){ state.tab=name; document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); $('page-'+name).classList.add('active'); $('nav-'+name).classList.add('active'); render(); }
    async function switchLang(){ state.lang=state.lang==='zh'?'en':'zh'; localStorage.setItem('fireos_lang',state.lang); if(state.user) await setDoc(userDoc('settings'),{language:state.lang},{merge:true}); render(); }
    function openSheet(asset=null){ state.editing=asset?.id||null; $('sheetTitle').textContent=asset?t('edit'):t('add'); $('assetName').value=asset?.name||''; $('assetType').value=asset?.type||'etf'; $('assetAmount').value=asset?.amount?Number(asset.amount).toLocaleString('zh-TW'):''; $('assetNote').value=asset?.note||''; $('deleteAsset').style.display=asset?'block':'none'; $('sheet').classList.add('show'); }
    function closeSheet(){ $('sheet').classList.remove('show'); state.editing=null; }
    async function saveAsset(){ const data={name:$('assetName').value.trim()||'Untitled',type:$('assetType').value,amount:parseMoney($('assetAmount').value),note:$('assetNote').value.trim(),updatedAt:serverTimestamp()}; if(state.editing) await updateDoc(doc(db,...uidPath('assets',state.editing)),data); else await addDoc(collection(db,...uidPath('assets')),{...data,createdAt:serverTimestamp()}); closeSheet(); }
    async function removeAsset(){ if(!state.editing||!confirm(t('del')+'?')) return; await deleteDoc(doc(db,...uidPath('assets',state.editing))); closeSheet(); }
    window.detail = id => { const a=state.assets.find(x=>x.id===id); if(a) openSheet(a); };

    window.addEventListener('DOMContentLoaded',()=>{ $('loginBtn').onclick=()=>signInWithPopup(auth,provider).catch(e=>alert(e.message)); $('logout').onclick=()=>signOut(auth); $('langBtn').onclick=switchLang; document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>tab(b.dataset.tab)); $('fab').onclick=()=>openSheet(); $('sheetClose').onclick=closeSheet; $('cancelAsset').onclick=closeSheet; $('saveAsset').onclick=saveAsset; $('deleteAsset').onclick=removeAsset; $('assetAmount').oninput=e=>{ const raw=e.target.value.replace(/,/g,'').replace(/[^0-9]/g,''); e.target.value=raw?Number(raw).toLocaleString('zh-TW'):''; }; translate(); });
    onAuthStateChanged(auth,async user=>{ state.user=user; if(!user){ $('login').style.display='flex'; $('app').style.display='none'; state.unsub.forEach(f=>f()); return; } $('login').style.display='none'; $('app').style.display='block'; await seed(user); listen(); });
  </script>

;text-align:left;padding:14px 0;background:transparent;border-bottom:1px solid rgba(255,255,255,.08)}.wealth-row:last-child{border-bottom:0}.asset-icon{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;background:rgba(100,241,166,.14)}.row-main{flex:1;min-width:0}.row-main strong{display:block;font-size:17px}.row-main span,.row-right span{display:block;color:var(--muted);font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.row-right{text-align:right}.row-right b{display:block;font-size:16px}.empty{color:var(--muted);padding:18px;text-align:center}.alloc{display:grid;grid-template-columns:1fr auto;gap:8px;margin:14px 0;color:var(--muted)}.alloc div{grid-column:1/3;height:8px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}.alloc i{display:block;height:100%;background:linear-gradient(90deg,var(--mint),#6DA8FF);border-radius:999px}.debt-card{display:flex;justify-content:space-between;gap:16px;padding:22px;margin-bottom:14px;border:1px solid var(--stroke);border-radius:var(--radius);background:rgba(43,72,54,.74)}.debt-card h3{font-size:24px;margin:0 0 8px}.debt-card p{color:var(--muted);margin:0}.debt-card strong{font-size:22px;color:var(--red);align-self:center;white-space:nowrap}.profile{display:flex;align-items:center;gap:12px}.profile img{width:48px;height:48px;border-radius:50%}.profile strong{display:block}.profile span{color:var(--muted);font-size:13px}.logout{padding:11px 16px;border-radius:16px;background:rgba(255,255,255,.11);margin-top:18px}.bottom-nav{position:fixed;left:50%;bottom:calc(14px + var(--safe));transform:translateX(-50%);width:min(470px,calc(100vw - 28px));height:78px;border-radius:999px;background:rgba(16,35,26,.74);border:1px solid rgba(255,255,255,.16);box-shadow:0 14px 50px rgba(0,0,0,.45);backdrop-filter:blur(26px);display:grid;grid-template-columns:repeat(5,1fr);padding:7px;z-index:50}.nav-btn{border-radius:999px;background:transparent;color:rgba(255,255,255,.86);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:12px;font-weight:750}.nav-btn i{font-style:normal;font-size:24px}.nav-btn.active{background:rgba(255,255,255,.14);color:var(--mint)}.fab{position:fixed;right:calc(24px + env(safe-area-inset-right,0px));bottom:calc(104px + var(--safe));width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#8AB6FF,#60A5FA);box-shadow:0 18px 40px rgba(96,165,250,.34);font-size:46px;font-weight:300;z-index:55}.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;display:none;align-items:flex-end}.backdrop.show{display:flex}.sheet{width:100%;max-width:520px;margin:0 auto;background:#102019;border:1px solid var(--stroke);border-radius:34px 34px 0 0;padding:22px 18px calc(22px + var(--safe));box-shadow:0 -20px 60px rgba(0,0,0,.5);animation:sheet .22s ease both}@keyframes sheet{from{transform:translateY(100%)}to{transform:none}}.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.sheet-head h2{margin:0}.x{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1)}.field{margin:14px 0}.field label{display:block;color:var(--muted);font-weight:800;margin-bottom:8px}.field input,.field select,.field textarea{width:100%;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.14);color:var(--text);border-radius:16px;padding:14px 15px;outline:0}.field textarea{min-height:82px;resize:vertical}.sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}.secondary{padding:15px;border-radius:17px;background:rgba(255,255,255,.09);font-weight:850}.danger{padding:15px;border-radius:17px;background:rgba(241,124,130,.85);font-weight:850}
    @media(min-width:760px){.app{max-width:1180px;padding-left:320px}.bottom-nav{left:24px;top:24px;bottom:auto;transform:none;width:260px;height:auto;border-radius:28px;grid-template-columns:1fr;padding:14px;gap:8px}.nav-btn{height:58px;flex-direction:row;justify-content:flex-start;padding-left:20px;font-size:15px}.fab{right:42px}.page-title{font-size:64px}.home-layout{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.hero{margin-bottom:0}.metric-grid{grid-template-columns:repeat(4,1fr)}.asset-layout{display:grid;grid-template-columns:1.05fr .95fr;gap:18px}}

    /* Layout hotfix 2.3.2a: keep cards, charts and large numbers inside their containers on wide and narrow screens. */
    html,body{overflow-x:hidden}
    .app{width:100%}
    .glass{overflow:hidden}
    .hero-grid{grid-template-columns:minmax(0,1fr) auto;align-items:center}
    .amount{font-size:clamp(38px,8vw,82px);line-height:.95;max-width:100%;overflow-wrap:anywhere}
    .subline{max-width:100%;overflow-wrap:anywhere}
    .chart-card{position:relative;min-width:0}
    .chart-card canvas{display:block;width:100%!important;max-width:100%;height:260px!important;margin:0 auto}
    #donutChart{height:230px!important;max-height:230px!important}
    #trendChart{height:260px!important;max-height:260px!important}
    #allocationBars{margin-top:14px}
    .asset-layout,.home-layout,.metric-grid{min-width:0}
    .seg{max-width:100%;overflow-x:auto}
    @media(min-width:760px){
      .app{max-width:100%;padding-left:320px;padding-right:42px}
      .home-layout{grid-template-columns:minmax(0,1.2fr) minmax(320px,.8fr)}
      .asset-layout{grid-template-columns:minmax(0,1fr) minmax(360px,.9fr)}
      .amount{font-size:clamp(42px,5.5vw,96px)}
      .hero{min-width:0}
      .metric b{font-size:clamp(18px,1.8vw,28px);overflow-wrap:anywhere}
    }
    @media(max-width:520px){
      .top-actions{flex-wrap:wrap}
      .hero-grid{grid-template-columns:1fr;gap:20px}
      .ring{justify-self:center}
      .metric-grid{grid-template-columns:1fr}
      .page-title{font-size:clamp(42px,13vw,54px)}
      .amount{font-size:clamp(36px,12vw,48px)}
      .chart-card canvas{height:220px!important}
      #donutChart{height:210px!important;max-height:210px!important}
    }
  </style>
</head>
<body>
  <div class="login" id="login"><div class="login-card"><div class="logo">🔥</div><h1>FIRE OS</h1><p data-i18n="loginSub">用 Google 登入，讓你的財富資料雲端同步。</p><button class="primary" id="loginBtn" data-i18n="login">使用 Google 登入</button></div></div>
  <main class="app" id="app">
    <section class="page active" id="page-home"><div class="top-actions"><button class="circle-btn" id="langBtn">中 / EN</button><button class="circle-btn">🔔</button></div><div class="kicker" data-i18n="goodEvening">GOOD EVENING</div><h1 class="page-title" id="welcomeName">歡迎回來 👋</h1><div class="home-layout"><div class="glass hero"><div class="hero-grid"><div><div class="label">NET WORTH</div><div class="amount" id="netWorth">NT$0</div><div class="subline" id="homeSub">Cloud synced</div></div><div class="ring" id="fireRing"><b id="firePct">0%</b></div></div></div><div class="glass hero"><div class="label" data-i18n="ai">AI 今日洞察</div><div id="aiList"></div></div></div><div class="metric-grid"><div class="metric"><span data-i18n="totalAssets">總資產</span><b id="homeAssets">NT$0</b></div><div class="metric"><span data-i18n="totalDebt">總負債</span><b class="red" id="homeDebt">NT$0</b></div><div class="metric"><span data-i18n="cashflow">月現金流</span><b class="mint" id="homeCashflow">NT$0</b></div><div class="metric"><span data-i18n="fire">FIRE 進度</span><b class="gold" id="fireSmall">--</b></div></div></section>
    <section class="page" id="page-assets"><div class="top-actions"><button class="circle-btn">↻</button><button class="circle-btn">⌁</button><button class="circle-btn">ⓘ</button></div><h1 class="page-title" data-i18n="myAssets">我的資產</h1><div class="asset-layout"><div><div class="glass hero"><div class="label" data-i18n="totalAssets">總資產</div><div class="amount" id="assetHeroAmount">NT$0</div><div class="subline" id="assetHeroChange">▲ Today +0</div><div class="seg" style="margin-top:22px;width:max-content"><button>7D</button><button class="active">30D</button><button>YTD</button><button>ALL</button></div></div><div class="glass chart-card"><canvas id="trendChart"></canvas></div></div><div><div class="glass chart-card"><div class="section" style="margin-top:0"><h2 data-i18n="allocation">資產配置</h2></div><canvas id="donutChart"></canvas><div id="allocationBars"></div></div><div class="glass chart-card"><div class="section" style="margin-top:0"><h2 data-i18n="list">資產列表</h2></div><div id="assetList"></div></div></div></div></section>
    <section class="page" id="page-invest"><h1 class="page-title" data-i18n="invest">投資</h1><div class="glass hero"><div class="label">INVESTMENTS</div><div class="amount">Coming Soon</div><div class="subline">Investment detail will be the next sprint.</div></div></section>
    <section class="page" id="page-debt"><h1 class="page-title" data-i18n="debt">負債</h1><div class="glass hero"><div class="label" data-i18n="totalDebt">總負債</div><div class="amount red" id="debtHeroAmount">NT$0</div></div><div id="debtList"></div></section>
    <section class="page" id="page-settings"><h1 class="page-title" data-i18n="settings">設定</h1><div class="glass chart-card"><div class="profile"><img id="avatar"><div><strong id="email">--</strong><span>Google Account</span></div></div><button class="logout" id="logout" data-i18n="logout">登出</button></div></section>
    <button class="fab" id="fab">+</button><nav class="bottom-nav"><button class="nav-btn active" id="nav-home" data-tab="home"><i>⌂</i><span data-i18n="home">首頁</span></button><button class="nav-btn" id="nav-assets" data-tab="assets"><i>▣</i><span data-i18n="assets">資產</span></button><button class="nav-btn" id="nav-invest" data-tab="invest"><i>◔</i><span data-i18n="invest">投資</span></button><button class="nav-btn" id="nav-debt" data-tab="debt"><i>▰</i><span data-i18n="debt">負債</span></button><button class="nav-btn" id="nav-settings" data-tab="settings"><i>⚙</i><span data-i18n="settings">設定</span></button></nav>
  </main>
  <div class="backdrop" id="sheet"><div class="sheet"><div class="sheet-head"><h2 id="sheetTitle">新增資產</h2><button class="x" id="sheetClose">×</button></div><div class="field"><label data-i18n="name">名稱</label><input id="assetName"></div><div class="field"><label data-i18n="type">類型</label><select id="assetType"><option value="cash">Cash</option><option value="etf">ETF</option><option value="stock">Stocks</option><option value="realEstate">Real Estate</option><option value="crypto">Crypto</option><option value="other">Other</option></select></div><div class="field"><label data-i18n="amount">金額</label><input id="assetAmount" inputmode="numeric"></div><div class="field"><label data-i18n="note">備註</label><textarea id="assetNote"></textarea></div><div class="sheet-actions"><button class="secondary" id="cancelAsset" data-i18n="cancel">取消</button><button class="primary" id="saveAsset" data-i18n="save">儲存</button></div><button class="danger" id="deleteAsset" style="display:none;width:100%;margin-top:12px" data-i18n="del">刪除</button></div></div>
</body>
</html>
