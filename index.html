<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>FIRE OS 2.4</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="assets/css/style.css"></head><body>
<section id="login" class="login"><div class="login-card"><div class="logo">🔥</div><h1>FIRE OS 2.4</h1><p data-i18n="welcome">用 Google 登入，讓你的財富自由 Dashboard 雲端同步。</p><button id="loginBtn" class="primary" data-i18n="login">使用 Google 登入</button></div></section>
<div id="app" class="app hidden"><div class="shell"><aside class="sidebar"><div class="brand"><div class="logo">🔥</div><div><h1>FIRE OS</h1><p>Personal Wealth OS</p></div></div><nav class="nav"><button class="active" data-page="dashboard">🏠 <span data-i18n="dashboard">儀表板</span></button><button data-page="assets">💼 <span data-i18n="assets">資產</span></button><button data-page="charts">📊 <span data-i18n="chart">儀表</span></button><button data-page="debt">💳 <span data-i18n="debt">負債</span></button><button data-page="settings">⚙️ <span data-i18n="settings">設定</span></button></nav></aside><main class="main"><div class="mobile-top"><span>00:10</span><span>▰▰▰ 79🔋</span></div>
<section id="dashboard" class="page active"><div class="eyebrow" data-i18n="good">GOOD EVENING</div><div class="title-row"><h2 class="page-title" data-i18n="dashboard">儀表板</h2><div class="top-actions"><button class="pill-btn" id="logoutBtn" data-i18n="logout">登出</button></div></div><div class="hero-card"><div><div class="label" data-i18n="netWorth">NET WORTH</div><div id="netWorth" class="hero-number">NT$0</div><div id="heroMeta" class="subline">Cloud synced</div></div><div id="fireRing" class="fire-ring" style="--p:0"><span id="firePct">0%</span></div></div><div class="grid"><div class="card"><h3 data-i18n="totalAssets">總資產</h3><div id="assetsTotal" class="amount">NT$0</div></div><div class="card"><h3 data-i18n="totalDebt">總負債</h3><div id="debtTotal" class="amount red">NT$0</div></div><div class="card"><h3 data-i18n="cashflow">月現金流</h3><div id="cashflowTotal" class="amount green">NT$0</div></div></div><div class="wide-grid"><div class="card chart-card"><h3 data-i18n="chart">儀表</h3><div class="fake-chart"><div class="fake-line"></div></div></div><div class="card"><h3 data-i18n="ai">AI 快速洞察</h3><div id="aiList" class="ai-list"></div></div></div></section>
<section id="assets" class="page"><div class="title-row"><h2 class="page-title" data-i18n="myAssets">我的資產</h2><button class="round-btn" id="addBtn">＋</button></div><div id="assetList" class="list"></div></section>
<section id="charts" class="page"><div class="title-row"><h2 class="page-title" data-i18n="chart">儀表</h2></div><div class="hero-card"><div><div class="label">NETWORTH</div><div id="netWorth2" class="hero-number">$89,073,097</div><div class="subline">+27.82% this year</div></div></div><div class="card chart-card"><h3 data-i18n="investment">投資組合</h3><div class="fake-chart"><div class="fake-line"></div></div></div></section>
<section id="debt" class="page"><div class="title-row"><h2 class="page-title" data-i18n="myDebt">我的負債</h2><button class="round-btn" id="addBtn">＋</button></div><div id="debtList" class="list"></div></section>
<section id="settings" class="page"><div class="title-row"><h2 class="page-title" data-i18n="settings">設定</h2></div><div class="settings-list"><div class="setting-row"><strong data-i18n="language">語言</strong><div class="lang-toggle"><button class="lang-btn" data-lang="zh">中文</button><button class="lang-btn" data-lang="en">EN</button></div></div><div class="setting-row"><strong data-i18n="currency">主要顯示幣別</strong><span>TWD</span></div><div class="setting-row"><strong>Account</strong><span id="who"></span></div></div></section>
</main></div><button class="fab" id="addBtn">+</button><nav class="bottom-nav"><button class="active" data-page="dashboard"><span>▦</span><span data-i18n="dashboard">儀表板</span></button><button data-page="assets"><span>💼</span><span data-i18n="assets">資產</span></button><button data-page="charts"><span>◔</span><span data-i18n="chart">儀表</span></button><button data-page="debt"><span>▰</span><span data-i18n="debt">負債</span></button><button data-page="settings"><span>⚙</span><span data-i18n="settings">設定</span></button></nav></div><script type="module" src="assets/js/app.js"></script></body></html>
